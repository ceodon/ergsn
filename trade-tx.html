<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://plausible.io; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://formsubmit.co https://cool-meadow-ergsn-tg-655a.ceodon.workers.dev https://ergsn-rfq-tracker.ceodon.workers.dev https://ergsn-mail.ceodon.workers.dev https://ergsn-trade-docs.ceodon.workers.dev https://plausible.io; frame-ancestors 'none'; base-uri 'self'; object-src 'none';">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ERGSN Trade Transaction · Admin Detail</title>
<meta name="robots" content="noindex,nofollow">
<meta name="referrer" content="no-referrer">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<style>
  :root { --gold:#34d298; --navy:#0f0f0f; --navy-2:#141414; --white:#fff; --tx-mid:#cfcfcf; --tx-lt:#8a8b8d; --border:#242424; --warn:#e0a83f; }
  * { box-sizing:border-box; }
  body { margin:0; background:#0a0a0a; color:var(--tx-mid); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,"Noto Sans KR",sans-serif; line-height:1.55; }
  .wrap { max-width:1100px; margin:0 auto; padding:2rem clamp(16px,4vw,32px) 4rem; }
  h1 { color:var(--white); font-size:1.4rem; margin:0 0 .3rem; }
  h2 { color:var(--white); font-size:13px; margin:0 0 .8rem; font-weight:700; letter-spacing:.06em; text-transform:uppercase; }
  .pill { display:inline-block; padding:3px 9px; background:rgba(224,168,63,.14); color:var(--warn); border:1px solid rgba(224,168,63,.4); border-radius:12px; font-size:10.5px; letter-spacing:.08em; text-transform:uppercase; font-weight:700; margin-bottom:.6rem; }
  .panel { background:var(--navy-2); border:1px solid var(--border); border-radius:10px; padding:1.2rem 1.4rem; margin-bottom:1rem; }
  .small { font-size:11.5px; color:var(--tx-lt); }
  .row { display:flex; flex-direction:column; gap:6px; margin-bottom:.7rem; }
  .row.two { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:.7rem; }
  @media (max-width:600px) { .row.two { grid-template-columns:1fr; } }
  label { font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--tx-lt); font-weight:700; }
  input, select, textarea { width:100%; padding:8px 10px; background:#0d0d0d; border:1px solid var(--border); border-radius:6px; color:var(--white); font:inherit; font-size:12.5px; outline:none; }
  input:focus, select:focus, textarea:focus { border-color:var(--gold); }
  .btn { display:inline-flex; align-items:center; justify-content:center; gap:6px; padding:8px 14px; border-radius:6px; font-size:12px; font-weight:700; cursor:pointer; border:0; text-decoration:none; }
  .btn-primary { background:var(--gold); color:#0a0a0a; }
  .btn-warn { background:var(--warn); color:#0a0a0a; }
  .btn-ghost { background:transparent; color:var(--tx-mid); border:1px solid var(--border); }
  .btn-ghost:hover { border-color:var(--gold); color:var(--gold); }
  .btn-danger { background:transparent; color:#ff8a8a; border:1px solid #4a2424; }
  .btn-danger:hover { border-color:#ff8a8a; }
  table.tx { width:100%; border-collapse:collapse; font-size:12.5px; }
  table.tx th, table.tx td { text-align:left; padding:7px 6px; border-bottom:1px solid #1d1d1d; vertical-align:top; }
  table.tx th { font-size:10px; text-transform:uppercase; letter-spacing:.06em; color:var(--tx-lt); font-weight:700; }
  table.tx td a { color:var(--gold); text-decoration:none; margin-right:8px; }
  table.tx td .amt { font-family:ui-monospace,Menlo,monospace; color:var(--white); }
  .status { display:inline-block; padding:3px 9px; border-radius:10px; font-size:10.5px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; background:#1f1f1f; color:var(--tx-mid); }
  .status.shipped, .status.paid, .status.closed { background:rgba(52,210,152,.14); color:var(--gold); }
  .status.cancelled { background:rgba(255,107,107,.12); color:#ff8a8a; }
  .empty { color:var(--tx-lt); font-style:italic; font-size:12.5px; padding:8px 0; }
  .toast { padding:9px 13px; border-radius:6px; font-size:12.5px; margin-top:.7rem; display:none; }
  .toast.ok { background:rgba(52,210,152,.12); color:var(--gold); border:1px solid rgba(52,210,152,.3); display:block; }
  .toast.err { background:rgba(224,107,107,.12); color:#ff8a8a; border:1px solid rgba(224,107,107,.3); display:block; }
  .doc-actions { display:flex; gap:6px; flex-wrap:wrap; margin-top:.6rem; }
  .progress { display:flex; gap:6px; flex-wrap:wrap; align-items:center; margin:.4rem 0 .8rem; font-size:11px; }
  .progress .step { padding:3px 9px; border:1px solid var(--border); border-radius:10px; color:var(--tx-lt); }
  .progress .step.done { background:rgba(52,210,152,.1); border-color:rgba(52,210,152,.3); color:var(--gold); }
  .progress .step.now  { background:rgba(224,168,63,.14); border-color:rgba(224,168,63,.4); color:var(--warn); }
  .audit { font-size:11.5px; color:var(--tx-lt); }
  .audit li { margin-bottom:4px; list-style:none; padding-left:0; }
  .audit code { font-size:10.5px; background:#0d0d0d; padding:1px 5px; border-radius:3px; color:var(--gold); }
</style>
</head>
<body>
<!-- Shared ERGSN header is injected via scripts/header.js -->
<div class="wrap">
  <p class="pill">Owner Tool · Admin Only</p>
  <h1 id="pageTitle">Loading…</h1>
  <p class="small" id="metaLine"></p>

  <div class="panel" id="gate">
    <h2>관리자 인증</h2>
    <div class="row"><label>ADMIN_KEY</label><input type="password" id="adminKeyInput" autocomplete="off"></div>
    <div><button class="btn btn-primary" id="gateBtn">진입 →</button></div>
    <div class="toast" id="gateToast"></div>
  </div>

  <div id="app" style="display:none;">
    <!-- Buyer + status + share link -->
    <div class="panel" id="txCard"></div>

    <!-- Status progression -->
    <div class="panel">
      <h2>Status 진행</h2>
      <div id="progress" class="progress"></div>
      <div class="row two">
        <div>
          <label>다음 단계</label>
          <select id="nextStatus"></select>
        </div>
        <div>
          <label>&nbsp;</label>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <button class="btn btn-primary" id="advanceBtn">→ Advance status</button>
            <button class="btn btn-ghost" id="revertBtn" type="button" title="Revert one step (e.g. unmark Paid)">↩ Revert one step</button>
          </div>
        </div>
      </div>
      <p class="small">Advance: buyer에게 자동 메일 + Telegram 알림. Revert: 직전 단계로 1-step 되돌림 (메일 발송 안 함, owner Telegram만).</p>
      <div class="toast" id="statusToast"></div>
    </div>

    <!-- Documents -->
    <div class="panel">
      <h2>Documents</h2>
      <div id="docTables"></div>
    </div>

    <!-- Attachments (R2) -->
    <div class="panel">
      <h2>Attachments</h2>
      <div id="attTable"><span class="small">로딩 중…</span></div>
      <div class="row two" style="margin-top:.6rem">
        <div>
          <label>Kind</label>
          <select id="upKind">
            <option value="bl">Bill of Lading scan</option>
            <option value="coa">Certificate of Analysis (COA)</option>
            <option value="coo">Certificate of Origin</option>
            <option value="payment-proof">Payment proof</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div>
          <label>File (≤12 MB · pdf · png · jpg · webp · zip · xlsx · docx · csv)</label>
          <input id="upFile" type="file">
        </div>
      </div>
      <div class="row two">
        <div>
          <label>Linked doc id (optional)</label>
          <input id="upDocId" placeholder="CI-2026-0001">
        </div>
        <div>
          <label>Notes (optional)</label>
          <input id="upNotes">
        </div>
      </div>
      <div><button class="btn btn-primary" id="upBtn">Upload</button></div>
      <div class="toast" id="upToast"></div>
    </div>

    <!-- Email send history -->
    <div class="panel">
      <h2>Email History</h2>
      <div id="emailList" class="audit"><span class="small">로딩 중…</span></div>
    </div>

    <!-- Audit log -->
    <div class="panel">
      <h2>Audit Log</h2>
      <div id="auditList" class="audit"><span class="small">로딩 중…</span></div>
    </div>

    <!-- Admin tools -->
    <div class="panel">
      <h2>Tools</h2>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <a class="btn btn-ghost" href="trade-docs.html">← Dashboard</a>
        <button class="btn btn-ghost" id="copyTokenBtn">📋 Copy buyer URL</button>
        <button class="btn btn-danger" id="cancelTxBtn">Cancel transaction</button>
        <button class="btn btn-ghost" id="logoutBtn" style="margin-left:auto">Logout</button>
      </div>
      <div class="toast" id="toolsToast"></div>
    </div>
  </div>
</div>

<script src="scripts/trade-docs.js"></script>
<script>
const $ = (id) => document.getElementById(id);
const params = new URLSearchParams(location.search);
const TX_ID = params.get('id');

let txData = null;
let docs = null;

if (!TX_ID) document.body.innerHTML = '<div class="wrap"><h1>Missing ?id</h1></div>';

function showApp() { $('gate').style.display = 'none'; $('app').style.display = 'block'; load(); }

let attachments = [];
async function load() {
  $('pageTitle').textContent = 'Transaction ' + TX_ID;
  try {
    const r1 = await TD.apiAdmin('GET', '/tx/' + encodeURIComponent(TX_ID));
    txData = r1.transaction;
    attachments = r1.attachments || [];
    const r2 = await TD.apiAdmin('GET', '/doc/by-tx/' + encodeURIComponent(TX_ID));
    docs = r2.docs || {};
    renderTxCard();
    renderProgress();
    renderDocs();
    renderAttachments();
    loadAudit();
    loadEmailHistory();
  } catch (e) {
    $('app').innerHTML = '<div class="panel" style="color:#ff8a8a">Load failed: ' + TD.esc(e.message) + '</div>';
  }
}

function renderTxCard() {
  const buyerUrl = 'https://ergsn.net/trade-buyer.html?t=' + (txData.buyer_token || '');
  const rfqLink = txData.rfq_tracker_id
    ? '<a href="tracker.html?id=' + encodeURIComponent(txData.rfq_tracker_id) + '" target="_blank" style="color:var(--gold)">' + TD.esc(txData.rfq_tracker_id) + ' ↗</a>'
    : '<span class="small">-</span>';
  $('metaLine').innerHTML =
    '<span class="status ' + TD.esc(txData.status) + '">' + TD.esc(TD.STATUS_LABELS[txData.status] || txData.status) + '</span> · ' +
    'Created ' + TD.fmtDate(txData.created_at) + ' · ' +
    'Updated ' + TD.fmtDate(txData.updated_at) +
    (txData.buyer_token_rotated_at ? ' · <span style="color:var(--warn)">token rotated ' + TD.fmtDate(txData.buyer_token_rotated_at) + '</span>' : '');
  $('txCard').innerHTML = `
    <h2>Buyer</h2>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:13px;color:var(--white)">
      <div><label>Company</label><div>${TD.esc(txData.buyer_company)}</div></div>
      <div><label>Email</label><div>${TD.esc(txData.buyer_email)}</div></div>
      <div><label>Country</label><div>${TD.esc(txData.buyer_country || '-')}</div></div>
      <div><label>ERGSN Partner / Maker</label><div>${TD.esc(txData.ergsn_partner || '-')}</div></div>
      <div><label>RFQ Tracker</label><div>${rfqLink}</div></div>
      <div><label>Locale</label><div>${TD.esc(txData.locale || 'en')}</div></div>
      <div style="grid-column:1/-1"><label>Buyer Portal URL</label><div style="font-size:11.5px;display:flex;gap:6px;align-items:center"><a href="${TD.esc(buyerUrl)}" target="_blank" style="color:var(--gold);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${TD.esc(buyerUrl)}</a><button class="btn btn-ghost" style="padding:4px 8px;font-size:11px" onclick="rotateToken()">↻ Rotate</button></div></div>
      ${txData.rfq_summary ? '<div style="grid-column:1/-1"><label>Original RFQ Summary</label><pre style="font-size:11.5px;color:var(--tx-mid);white-space:pre-wrap;background:#0d0d0d;padding:8px;border-radius:6px;margin:0;max-height:120px;overflow:auto">' + TD.esc(txData.rfq_summary) + '</pre></div>' : ''}
      ${txData.notes ? '<div style="grid-column:1/-1"><label>Notes</label><div style="font-size:12.5px;color:var(--tx-mid)">' + TD.esc(txData.notes) + '</div></div>' : ''}
    </div>`;
}

window.rotateToken = async function() {
  if (!confirm('Rotate the buyer URL? The old URL will stop working immediately. The buyer will need to be sent the new URL.')) return;
  try {
    const r = await TD.apiAdmin('POST', '/tx/' + encodeURIComponent(TX_ID) + '/rotate-token');
    alert('✓ New URL: ' + r.buyer_url);
    load();
  } catch (e) { alert('Rotate failed: ' + e.message); }
};

const STATUS_ORDER = ['open','quoted','po-received','proforma-sent','paid','commercial-issued','packing-issued','shipped','closed'];

function renderProgress() {
  const cur = txData.status;
  const isCancelled = cur === 'cancelled';
  const idx = STATUS_ORDER.indexOf(cur);
  $('progress').innerHTML = STATUS_ORDER.map((s, i) => {
    let cls = 'step';
    if (!isCancelled) {
      if (i < idx) cls += ' done';
      else if (i === idx) cls += ' now';
    }
    return `<span class="${cls}">${TD.esc(TD.STATUS_LABELS[s])}</span>`;
  }).join('') + (isCancelled ? '<span class="step" style="background:rgba(255,107,107,.14);color:#ff8a8a;border-color:#4a2424">Cancelled</span>' : '');

  /* Populate dropdown of allowed transitions */
  const allowed = TD.STATUS_NEXT[cur] || [];
  const sel = $('nextStatus');
  sel.innerHTML = allowed.length
    ? allowed.map(s => `<option value="${s}">${TD.esc(TD.STATUS_LABELS[s])}</option>`).join('')
    : '<option value="">(no further transitions)</option>';
  $('advanceBtn').disabled = !allowed.length;
}

async function advance() {
  const t = $('statusToast'); t.className='toast'; t.textContent='';
  const next = $('nextStatus').value;
  if (!next) return;
  try {
    await TD.apiAdmin('PATCH', '/tx/' + encodeURIComponent(TX_ID), { status: next });
    t.className='toast ok'; t.textContent='✓ Status → ' + TD.STATUS_LABELS[next] + ' (buyer 메일 + Telegram 알림 발송됨)';
    setTimeout(load, 600);
  } catch (e) { t.className='toast err'; t.textContent='실패: ' + e.message; }
}

const STATUS_PREV = { quoted:'open','po-received':'quoted','proforma-sent':'po-received',paid:'proforma-sent','commercial-issued':'paid','packing-issued':'commercial-issued',shipped:'packing-issued',closed:'shipped' };

async function revertStatus() {
  const prev = STATUS_PREV[txData.status];
  if (!prev) { alert('Cannot revert from ' + txData.status); return; }
  const reason = prompt('Reverting ' + txData.status + ' → ' + prev + '. Reason (optional):', '');
  if (reason === null) return;
  try {
    await TD.apiAdmin('PATCH', '/tx/' + encodeURIComponent(TX_ID), { status: prev, revert: true, revert_reason: reason });
    setTimeout(load, 400);
  } catch (e) { alert('Revert failed: ' + e.message); }
}

function renderDocs() {
  let html = '';
  ['quotation','po','proforma','commercial','packing'].forEach(type => {
    const meta = TD.DOC_META[type];
    const list = docs[type] || [];
    html += '<div style="margin-bottom:1.2rem">';
    html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.4rem">';
    html += '<strong style="color:var(--white);font-size:13px">' + TD.esc(meta.title_en) + ' <span class="small">(' + meta.title_ko + ')</span></strong>';
    html += '<a class="btn btn-primary" href="trade-doc.html?type=' + type + '&tx=' + encodeURIComponent(TX_ID) + '" style="font-size:11px;padding:5px 10px">+ New ' + meta.prefix + '</a>';
    html += '</div>';
    if (!list.length) html += '<div class="empty">아직 발급된 ' + meta.title_en + ' 없음.</div>';
    else {
      html += '<table class="tx"><thead><tr><th>ID</th><th>Rev</th><th>Date</th><th>Total</th><th>Cur</th><th>Notes</th><th></th></tr></thead><tbody>';
      list.forEach(d => {
        const data = d.data || {};
        const isSuperseded = !!d.superseded_at;
        const buyerUrl = 'trade-doc-view.html?type=' + type + '&id=' + encodeURIComponent(d.id) + '&t=' + (txData.buyer_token || '');
        const editUrl  = 'trade-doc.html?type=' + type + '&tx=' + encodeURIComponent(TX_ID) + '&id=' + encodeURIComponent(d.id);
        /* Quotation expiry visual cue */
        let expiryNote = '';
        if (type === 'quotation' && data.valid_until) {
          const expired = data.valid_until < Date.now();
          expiryNote = expired
            ? ' <span style="background:rgba(255,107,107,.14);color:#ff8a8a;padding:1px 6px;border-radius:8px;font-size:10px;font-weight:700">EXPIRED</span>'
            : ' <span class="small">valid until ' + new Date(data.valid_until).toISOString().slice(0,10) + '</span>';
        }
        let extraBtn = '';
        if (type === 'proforma' && d.payment_status !== 'paid' && !isSuperseded) {
          extraBtn = ' · <a href="javascript:markPaid(\'' + d.id + '\')" style="color:var(--gold)">Mark Paid</a>';
        } else if (type === 'proforma' && d.payment_status === 'paid') {
          extraBtn = ' · <span class="small" style="color:var(--gold)">✓ paid</span>';
        }
        const note = type==='po' && d.buyer_signed_at ? '✓ buyer signed' : (data.notes ? data.notes.slice(0, 60) : '');
        const rowStyle = isSuperseded ? ' style="opacity:.5"' : '';
        const supersededBadge = isSuperseded ? ' <span style="background:rgba(255,255,255,.06);color:var(--tx-lt);padding:1px 6px;border-radius:8px;font-size:10px">superseded</span>' : '';
        html += '<tr' + rowStyle + '>';
        html += '<td><code>' + TD.esc(d.id) + '</code>' + supersededBadge + expiryNote + '</td>';
        html += '<td>v' + (d.revision || 1) + (d.parent_doc_id ? ' <span class="small" title="from ' + TD.esc(d.parent_doc_id) + '">↩</span>' : '') + '</td>';
        html += '<td>' + TD.fmtDate(d.created_at) + '</td>';
        html += '<td class="amt">' + TD.fmt(d.total_amount || data.total_amount) + '</td>';
        html += '<td>' + TD.esc(d.currency || data.currency || '') + '</td>';
        html += '<td>' + TD.esc(note) + '</td>';
        html += '<td>';
        if (!isSuperseded) {
          html += '<a href="' + editUrl + '">Edit</a> · ';
          html += '<a href="javascript:reviseDoc(\'' + type + '\',\'' + d.id + '\')" style="color:var(--warn)">Revise</a> · ';
        }
        html += '<a href="' + buyerUrl + '" target="_blank">View</a>' + extraBtn;
        html += '</td>';
        html += '</tr>';
      });
      html += '</tbody></table>';
    }
    html += '</div>';
  });
  $('docTables').innerHTML = html;
}

window.markPaid = async function(proformaId) {
  if (!confirm('Mark proforma ' + proformaId + ' as PAID?')) return;
  try {
    await TD.apiAdmin('PATCH', '/doc/proforma/' + encodeURIComponent(proformaId), { payment_status: 'paid', paid_at: Date.now() });
    load();
  } catch (e) { alert('실패: ' + e.message); }
};

window.reviseDoc = async function(type, sourceId) {
  if (!confirm('Create a new revision of ' + sourceId + '? The current version will be marked superseded; bayer portal will show only the new revision.')) return;
  try {
    /* Load current doc data, post-revise with same payload — admin then
       opens the new revision and edits inline. */
    const r1 = await TD.apiAdmin('GET', '/doc/' + type + '/' + encodeURIComponent(sourceId));
    const r2 = await TD.apiAdmin('POST', '/doc/' + type + '/' + encodeURIComponent(sourceId) + '/revise', { data: r1.doc.data });
    location.href = 'trade-doc.html?type=' + type + '&tx=' + encodeURIComponent(TX_ID) + '&id=' + encodeURIComponent(r2.id);
  } catch (e) { alert('Revise 실패: ' + e.message); }
};

const KIND_LABEL = { 'bl':'B/L scan', 'coa':'COA', 'coo':'COO', 'payment-proof':'Payment proof', 'other':'Other' };

function renderAttachments() {
  if (!attachments.length) { $('attTable').innerHTML = '<div class="empty">첨부 없음.</div>'; return; }
  let html = '<table class="tx"><thead><tr><th>ID</th><th>Kind</th><th>File</th><th>Size</th><th>Uploaded by</th><th>Date</th><th></th></tr></thead><tbody>';
  attachments.forEach(a => {
    const url = TD.API_URL + '/file/' + encodeURIComponent(a.id) + '?t=' + (txData.buyer_token || '');
    html += '<tr>';
    html += '<td><code>' + TD.esc(a.id) + '</code></td>';
    html += '<td>' + TD.esc(KIND_LABEL[a.kind] || a.kind) + '</td>';
    html += '<td>' + TD.esc(a.filename) + (a.notes ? ' <span class="small">— ' + TD.esc(a.notes) + '</span>' : '') + '</td>';
    html += '<td>' + (a.size_bytes ? (a.size_bytes/1024).toFixed(0) + ' KB' : '') + '</td>';
    html += '<td>' + TD.esc(a.uploaded_by || '') + '</td>';
    html += '<td>' + TD.fmtDate(a.created_at) + '</td>';
    html += '<td><a href="' + url + '" target="_blank">Download</a> · <a href="javascript:deleteAttachment(\'' + TD.esc(a.id) + '\')" style="color:#ff8a8a">Delete</a></td>';
    html += '</tr>';
  });
  html += '</tbody></table>';
  $('attTable').innerHTML = html;
}

window.deleteAttachment = async function(id) {
  if (!confirm('Delete attachment ' + id + '? File will be permanently removed from R2.')) return;
  try {
    const r = await fetch(TD.API_URL + '/attachment/' + encodeURIComponent(id), {
      method: 'DELETE', headers: { 'X-Admin-Key': TD.adminKey() }
    });
    const j = await r.json();
    if (!r.ok || j.ok === false) throw new Error(j.error || 'HTTP ' + r.status);
    load();
  } catch (e) { alert('실패: ' + e.message); }
};

async function uploadFile() {
  const t = $('upToast'); t.className='toast'; t.textContent='';
  const f = $('upFile').files && $('upFile').files[0];
  if (!f) { t.className='toast err'; t.textContent='파일을 선택하세요.'; return; }
  const fd = new FormData();
  fd.append('file', f);
  fd.append('transaction_id', TX_ID);
  fd.append('kind', $('upKind').value);
  if ($('upDocId').value.trim()) fd.append('doc_id', $('upDocId').value.trim());
  if ($('upNotes').value.trim()) fd.append('notes', $('upNotes').value.trim());
  try {
    const r = await fetch(TD.API_URL + '/upload', { method:'POST', headers:{ 'X-Admin-Key': TD.adminKey() }, body: fd });
    const j = await r.json();
    if (!r.ok || j.ok === false) throw new Error(j.error || 'HTTP ' + r.status);
    t.className='toast ok'; t.textContent = '✓ ' + j.id + ' uploaded (' + (j.size/1024).toFixed(0) + ' KB)';
    $('upFile').value=''; $('upDocId').value=''; $('upNotes').value='';
    load();
  } catch (e) { t.className='toast err'; t.textContent='실패: ' + e.message; }
}

async function loadEmailHistory() {
  try {
    const r = await TD.apiAdmin('GET', '/email-log/by-tx/' + encodeURIComponent(TX_ID));
    const items = r.items || [];
    if (!items.length) { $('emailList').innerHTML = '<span class="small">발송 기록 없음.</span>'; return; }
    $('emailList').innerHTML = '<ul style="margin:0;padding:0">' + items.map(e =>
      '<li>' + (e.status==='sent' ? '✓' : '✗') + ' <code>' + TD.esc(e.doc_type || '-') + '</code> ' +
      (e.doc_id ? '<code>' + TD.esc(e.doc_id) + '</code> ' : '') +
      '→ ' + TD.esc(e.to_email) + ' · ' + TD.fmtDate(e.created_at) + ' UTC' +
      (e.detail ? ' <span class="small">— ' + TD.esc(e.detail) + '</span>' : '') +
      '</li>'
    ).join('') + '</ul>';
  } catch (e) {
    $('emailList').innerHTML = '<span class="small">로드 실패: ' + TD.esc(e.message) + '</span>';
  }
}

async function loadAudit() {
  try {
    const r = await TD.apiAdmin('GET', '/audit/by-tx/' + encodeURIComponent(TX_ID));
    const items = r.items || [];
    if (!items.length) { $('auditList').innerHTML = '<span class="small">기록 없음.</span>'; return; }
    $('auditList').innerHTML = '<ul style="margin:0;padding:0">' + items.map(a =>
      '<li><code>' + TD.esc(a.action) + '</code> ' +
      (a.from_status ? '<code>' + TD.esc(a.from_status) + ' → ' + TD.esc(a.to_status || '?') + '</code> ' : '') +
      '· ' + TD.fmtDate(a.created_at) + ' UTC' +
      (a.detail ? ' · <span class="small">' + TD.esc(String(a.detail).slice(0, 200)) + '</span>' : '') +
      '</li>'
    ).join('') + '</ul>';
  } catch (e) {
    $('auditList').innerHTML = '<span class="small">감사 로그 로드 실패: ' + TD.esc(e.message) + '</span>';
  }
}

async function copyToken() {
  const t = $('toolsToast');
  const url = 'https://ergsn.net/trade-buyer.html?t=' + (txData.buyer_token || '');
  try {
    await navigator.clipboard.writeText(url);
    t.className='toast ok'; t.textContent = '✓ Buyer URL copied';
  } catch (_) {
    t.className='toast ok'; t.textContent = url;
  }
}

async function cancelTx() {
  if (!confirm('Cancel transaction ' + TX_ID + '? 되돌릴 수 없습니다.')) return;
  const t = $('toolsToast'); t.className='toast'; t.textContent='';
  try {
    await TD.apiAdmin('PATCH', '/tx/' + encodeURIComponent(TX_ID), { status: 'cancelled' });
    t.className='toast ok'; t.textContent = '✓ Cancelled.';
    setTimeout(load, 600);
  } catch (e) { t.className='toast err'; t.textContent = '실패: ' + e.message; }
}

async function tryGate() {
  const k = $('adminKeyInput').value.trim();
  if (!k) return;
  TD.setAdminKey(k);
  try { await TD.apiAdmin('GET', '/tx/' + encodeURIComponent(TX_ID)); showApp(); }
  catch (e) { TD.clearAdminKey(); const t=$('gateToast'); t.className='toast err'; t.textContent='❌ '+e.message; }
}

document.addEventListener('DOMContentLoaded', () => {
  if (TD.adminKey()) showApp();
  $('gateBtn').addEventListener('click', tryGate);
  $('adminKeyInput').addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); tryGate(); } });
  $('advanceBtn').addEventListener('click', advance);
  $('copyTokenBtn').addEventListener('click', copyToken);
  $('cancelTxBtn').addEventListener('click', cancelTx);
  $('logoutBtn').addEventListener('click', () => { TD.clearAdminKey(); location.href = 'trade-docs.html'; });
  $('upBtn').addEventListener('click', uploadFile);
  $('revertBtn').addEventListener('click', revertStatus);
});
</script>
<script defer src="scripts/header.js"></script>
</body>
</html>
