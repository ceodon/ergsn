<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>ERGSN intro — Sample B · Vertical Stack → Dissolve</title>
<style>
  :root {
    --navy: #0f0f0f;
    --green: #34d298;
    --steel: #a7a7a7;
    --grad-silver: linear-gradient(320deg, #a8a8a6 15%, #c2c0c0 48%, #f9f8f6 64%, #d4d4d4 76%, #7f7f7f 88%);
    --grad-green:  linear-gradient(84deg, #00bf79 42%, #00ffa1 81%);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; min-height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans KR", sans-serif;
    background: var(--navy);
    color: #fff;
    overflow-x: hidden;
    -webkit-text-size-adjust: 100%;
  }

  /* ── Intro overlay ─────────────────────────────────────────────────── */
  .intro {
    position: fixed; inset: 0;
    background: var(--navy);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    cursor: pointer;
    transition: opacity 0.55s ease;
  }
  .intro.done { opacity: 0; pointer-events: none; }

  /* Phase 1: vertical stack of phrases */
  .stack {
    display: flex; flex-direction: column; align-items: center; gap: 0.18em;
    transition: opacity 0.55s ease;
  }
  .stack.fading { opacity: 0; }

  .row {
    font-size: clamp(18px, 3.4vw, 38px);
    font-weight: 700;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    opacity: 0;
    transform: translateY(14px);
    transition: opacity 0.5s ease, transform 0.5s ease;
    white-space: nowrap;
    font-kerning: none;
  }
  .row.in { opacity: 1; transform: translateY(0); }

  .row .L {
    color: var(--green);
    font-weight: 800;
    margin-right: 0.04em;
  }
  .row .r { color: #aaa; font-weight: 600; }

  /* Phase 2: ERGSN logo (separately positioned, fades in as stack fades out) */
  .logo-final {
    position: absolute;
    inset: 0;
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    transform: scale(0.96);
    transition: opacity 0.6s ease, transform 0.7s cubic-bezier(.65,0,.35,1);
    pointer-events: none;
  }
  .logo-final.in { opacity: 1; transform: scale(1); }

  .logo-final .mark {
    font-size: clamp(38px, 7vw, 84px);
    font-weight: 800;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-kerning: none;
    line-height: 1;
  }
  .logo-final .e {
    background: var(--grad-green);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .logo-final .s {
    background: var(--grad-silver);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .skip-hint {
    position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
    color: var(--steel); font-size: 11px; letter-spacing: 0.12em;
    text-transform: uppercase;
    opacity: 0; transition: opacity 0.4s ease 0.6s;
    z-index: 101; pointer-events: none;
  }
  .intro:not(.done) .skip-hint { opacity: 0.7; }

  /* ── Home stub ─────────────────────────────────────────────────────── */
  .home {
    min-height: 100vh;
    min-height: 100dvh;
    padding: 80px 24px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; color: #fff;
  }
  .home .logo {
    font-size: clamp(34px, 5vw, 60px);
    font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; font-kerning: none;
  }
  .home .logo .e { background: var(--grad-green); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .home .logo .s { background: var(--grad-silver); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .home .tagline { color: var(--steel); margin-top: 14px; font-size: 14px; letter-spacing: 0.04em; }
  .home .placeholder { margin-top: 36px; padding: 14px 22px; border: 1px dashed rgba(255,255,255,.18); border-radius: 8px; color: #777; font-size: 12px; }

  .controls {
    position: fixed; top: 14px; right: 14px;
    display: flex; gap: 8px; z-index: 5;
  }
  .controls a, .controls button {
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.18);
    color: #ddd; font-size: 11px; padding: 5px 11px; border-radius: 5px;
    text-decoration: none; cursor: pointer; font-family: inherit; letter-spacing: 0.06em;
  }
  .controls a:hover, .controls button:hover { border-color: var(--green); color: var(--green); }

  @media (prefers-reduced-motion: reduce) {
    .intro { display: none; }
  }

  /* Mobile — shrink stack rows + tighten logo for narrow viewports */
  @media (max-width: 640px) {
    .row { font-size: clamp(15px, 5.4vw, 22px); }
    .stack { gap: 0.12em; padding: 0 12px; }
    .logo-final .mark { font-size: clamp(34px, 11vw, 56px); }
    .home .logo { font-size: clamp(30px, 11vw, 44px); }
    .home .tagline { font-size: 12px; padding: 0 16px; }
    .controls { top: 10px; right: 10px; }
    .controls a, .controls button { padding: 6px 10px; }
  }
  /* Landscape phones — keep stack inside viewport height */
  @media (max-height: 540px) and (orientation: landscape) {
    .row { font-size: clamp(14px, 4.4vh, 22px); }
    .stack { gap: 0.08em; }
    .logo-final .mark { font-size: clamp(30px, 9vh, 56px); }
  }
</style>
</head>
<body>

<div class="intro" id="intro">
  <div class="stack" id="stack">
    <div class="row"><span class="L">E</span><span class="r">levate</span></div>
    <div class="row"><span class="r" style="color:#666;">&amp;</span></div>
    <div class="row"><span class="L">R</span><span class="r">each</span></div>
    <div class="row"><span class="L">G</span><span class="r">lobal</span></div>
    <div class="row"><span class="L">S</span><span class="r">ourcing</span></div>
    <div class="row"><span class="L">N</span><span class="r">etwork</span></div>
  </div>
  <div class="logo-final" id="logoFinal">
    <div class="mark"><span class="e">E</span><span class="s">R</span><span class="s">G</span><span class="s">S</span><span class="s">N</span></div>
  </div>
  <div class="skip-hint">click or ESC to skip</div>
</div>

<main class="home">
  <div class="logo"><span class="e">E</span><span class="s">R</span><span class="s">G</span><span class="s">S</span><span class="s">N</span></div>
  <div class="tagline">Elevate &amp; Reach Global Sourcing Network · Korea's Trusted Trade Gateway</div>
  <div class="placeholder">⌧ Home content (real index.html slots in here)</div>
</main>

<div class="controls">
  <button id="replay">↻ Replay</button>
  <a href="index.html">← Compare</a>
</div>

<script>
(() => {
  const intro = document.getElementById('intro');
  const stack = document.getElementById('stack');
  const rows  = stack.querySelectorAll('.row');
  const logoF = document.getElementById('logoFinal');

  function play() {
    intro.classList.remove('done');
    stack.classList.remove('fading');
    rows.forEach(r => r.classList.remove('in'));
    logoF.classList.remove('in');

    // 1) Stagger rows down (incl. ampersand row)
    rows.forEach((r, i) => setTimeout(() => r.classList.add('in'), i * 130));

    // 2) After ~0.95s, dissolve stack and surface logo
    setTimeout(() => {
      stack.classList.add('fading');
      logoF.classList.add('in');
    }, 1100);

    // 3) Fade out overlay at ~2.0s
    setTimeout(() => intro.classList.add('done'), 2000);
  }

  function skip() { intro.classList.add('done'); }

  intro.addEventListener('click', skip);
  document.addEventListener('keydown', e => { if (e.key === 'Escape') skip(); });
  document.getElementById('replay').addEventListener('click', play);

  if (matchMedia('(prefers-reduced-motion: reduce)').matches) {
    intro.classList.add('done');
  } else {
    play();
  }
})();
</script>
</body>
</html>
