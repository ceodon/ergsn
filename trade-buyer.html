<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://plausible.io; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://formsubmit.co https://cool-meadow-ergsn-tg-655a.ceodon.workers.dev https://ergsn-rfq-tracker.ceodon.workers.dev https://ergsn-mail.ceodon.workers.dev https://ergsn-trade-docs.ceodon.workers.dev https://plausible.io; frame-ancestors 'none'; base-uri 'self'; object-src 'none';">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ERGSN Trade — Buyer Portal</title>
<meta name="robots" content="noindex,nofollow">
<meta name="referrer" content="no-referrer">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<style>
  :root { --gold:#34d298; --navy:#0f0f0f; --navy-2:#141414; --white:#fff; --tx-mid:#cfcfcf; --tx-lt:#8a8b8d; --border:#242424; }
  * { box-sizing:border-box; }
  body { margin:0; background:#0a0a0a; color:var(--tx-mid); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif; line-height:1.55; }
  .wrap { max-width:880px; margin:0 auto; padding:2rem clamp(16px,4vw,32px) 4rem; }
  h1 { color:var(--white); font-size:1.4rem; margin:0 0 .3rem; }
  .small { font-size:11.5px; color:var(--tx-lt); }
  .panel { background:var(--navy-2); border:1px solid var(--border); border-radius:10px; padding:1.1rem 1.3rem; margin-bottom:.9rem; }
  .panel h2 { color:var(--white); font-size:13px; margin:0 0 .8rem; font-weight:700; letter-spacing:.04em; text-transform:uppercase; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th, td { padding:8px 6px; text-align:left; border-bottom:1px solid #1d1d1d; }
  th { font-size:10.5px; text-transform:uppercase; color:var(--tx-lt); font-weight:700; letter-spacing:.06em; }
  td a { color:var(--gold); text-decoration:none; }
  .empty { color:var(--tx-lt); font-style:italic; font-size:12.5px; padding:8px 0; }
  .status { display:inline-block; padding:2px 8px; border-radius:10px; font-size:10.5px; font-weight:700; background:#1f1f1f; color:var(--tx-mid); }
  .status.shipped, .status.paid { background:rgba(52,210,152,.14); color:var(--gold); }
  .actions { display:flex; gap:8px; flex-wrap:wrap; margin-top:1rem; }
  .btn { display:inline-flex; align-items:center; gap:6px; padding:9px 14px; border-radius:6px; font-size:12px; font-weight:700; text-decoration:none; }
  .btn-primary { background:var(--gold); color:#0a0a0a; }
  .btn-ghost { background:transparent; color:var(--tx-mid); border:1px solid var(--border); }
  .err { color:#ff8a8a; padding:1rem; }
</style>
</head>
<body>
<!-- Shared ERGSN header is injected via scripts/header.js -->
<div class="wrap">
  <h1>ERGSN Trade Portal</h1>
  <p class="small" id="info">Loading…</p>
  <div id="content"></div>
</div>
<script src="scripts/trade-docs.js"></script>
<script>
const $ = (id) => document.getElementById(id);
const token = new URLSearchParams(location.search).get('t') || '';

if (!/^[a-f0-9]{32}$/i.test(token)) {
  $('content').innerHTML = '<div class="err">Invalid or missing token. Please use the link sent by ERGSN.</div>';
} else {
  TD.apiBuyer(token).then(render).catch(e => {
    $('content').innerHTML = '<div class="err">Failed to load: ' + TD.esc(e.message) + '</div>';
  });
}

function row(d, type) {
  const meta = TD.DOC_META[type];
  let badge = '';
  if (type === 'quotation' && d.valid_until) {
    if (d.valid_until < Date.now()) {
      badge = ' <span style="background:rgba(255,107,107,.14);color:#ff8a8a;padding:1px 6px;border-radius:8px;font-size:10px;font-weight:700">EXPIRED</span>';
    } else {
      badge = ' <span style="font-size:10px;color:var(--tx-lt)">valid until ' + new Date(d.valid_until).toISOString().slice(0,10) + '</span>';
    }
  }
  return `<tr>
    <td><code>${TD.esc(d.id)}</code>${badge}</td>
    <td>${TD.esc(meta.title_en)}</td>
    <td>${TD.fmtDate(d.created_at)}</td>
    <td>${d.total_amount ? (TD.fmt(d.total_amount) + ' ' + TD.esc(d.currency || '')) : ''}</td>
    <td>${type === 'po' ? '' : '<a href="trade-doc-view.html?type=' + type + '&id=' + encodeURIComponent(d.id) + '&t=' + encodeURIComponent(token) + '">View / Print</a>'}</td>
  </tr>`;
}

function render(r) {
  const tx = r.transaction;
  $('info').innerHTML = 'Transaction <code>' + TD.esc(tx.id) + '</code> · ' + TD.esc(tx.buyer_company) + ' · <span class="status ' + tx.status + '">' + TD.esc(TD.STATUS_LABELS[tx.status] || tx.status) + '</span>';
  let html = '';
  ['quotation','proforma','commercial','packing'].forEach(type => {
    const list = r.docs[type] || [];
    html += '<div class="panel"><h2>' + TD.DOC_META[type].title_en + '</h2>';
    if (!list.length) html += '<div class="empty">No documents issued yet.</div>';
    else html += '<table><thead><tr><th>ID</th><th>Type</th><th>Date</th><th>Amount</th><th></th></tr></thead><tbody>' + list.map(d => row(d, type)).join('') + '</tbody></table>';
    html += '</div>';
  });
  /* PO section — submitted POs + new PO link / accept quotation */
  const pos = r.docs.po || [];
  const quotes = r.docs.quotation || [];
  const latestQuote = quotes.length ? quotes[quotes.length - 1] : null;
  const poLocked = !!tx.po_locked_at;
  html += '<div class="panel"><h2>Purchase Orders</h2>';
  if (pos.length) {
    html += '<table><thead><tr><th>ID</th><th>Submitted</th><th>Reference</th></tr></thead><tbody>';
    pos.forEach(p => {
      html += '<tr><td><code>' + TD.esc(p.id) + '</code></td><td>' + TD.fmtDate(p.created_at) + '</td><td>' + TD.esc((p.data && p.data.buyer_ref) || '-') + '</td></tr>';
    });
    html += '</tbody></table>';
  } else {
    html += '<div class="empty">No purchase order submitted yet.</div>';
  }
  if (poLocked) {
    html += '<p class="small" style="margin-top:.6rem">A purchase order has already been submitted for this transaction. Contact ERGSN if you need to amend it.</p>';
  } else {
    html += '<div class="actions">';
    if (latestQuote) {
      html += '<button class="btn btn-primary" id="acceptQuoteBtn" data-quote="' + TD.esc(latestQuote.id) + '">✓ Accept latest quotation (' + TD.esc(latestQuote.id) + ') →</button>';
      html += '<button class="btn btn-ghost" id="rejectQuoteBtn" data-quote="' + TD.esc(latestQuote.id) + '" style="border-color:#4a2424;color:#ff8a8a">Reject / Request revision</button>';
    }
    html += '<a class="btn btn-ghost" href="trade-doc-po.html?t=' + encodeURIComponent(token) + '">Or submit a custom Purchase Order</a>';
    html += '</div>';
  }
  html += '</div>';
  /* Attachments + payment-proof upload */
  const atts = r.attachments || [];
  html += '<div class="panel"><h2>Files</h2>';
  if (atts.length) {
    html += '<table><thead><tr><th>File</th><th>Kind</th><th>Uploaded</th><th></th></tr></thead><tbody>';
    atts.forEach(a => {
      const url = TD.API_URL + '/file/' + encodeURIComponent(a.id) + '?t=' + encodeURIComponent(token);
      const kind = ({ 'bl':'Bill of Lading', 'coa':'COA', 'coo':'Certificate of Origin', 'payment-proof':'Payment proof', 'other':'Other' })[a.kind] || a.kind;
      html += '<tr><td>' + TD.esc(a.filename) + '</td><td>' + TD.esc(kind) + '</td><td>' + TD.fmtDate(a.created_at) + '</td><td><a href="' + url + '" target="_blank">Download</a></td></tr>';
    });
    html += '</tbody></table>';
  } else {
    html += '<div class="empty">No files yet.</div>';
  }
  html += `<div style="margin-top:1rem;padding:.9rem;border:1px dashed var(--border);border-radius:8px">
    <p class="small" style="margin:0 0 .5rem;color:var(--tx-mid)">Upload payment proof (wire transfer receipt, bank slip):</p>
    <input id="ppFile" type="file" accept="application/pdf,image/png,image/jpeg,image/webp" style="font-size:12px;color:var(--tx-mid);background:#0d0d0d;border:1px solid var(--border);padding:6px;border-radius:6px;width:100%">
    <button class="btn btn-primary" id="ppUploadBtn" style="margin-top:.6rem">Upload Payment Proof</button>
    <span id="ppMsg" class="small" style="margin-left:.6rem"></span>
  </div></div>`;

  /* ERGSN contact panel — every buyer landing should know who to contact */
  html += `<div class="panel">
    <h2>Need Help?</h2>
    <p style="font-size:13px;color:var(--tx-mid);margin:0 0 .6rem">
      Reply to any ERGSN email or reach our trade desk directly:
    </p>
    <div style="display:flex;flex-wrap:wrap;gap:8px">
      <a class="btn btn-ghost" href="https://t.me/ceodon" target="_blank" rel="noopener noreferrer">Telegram @ceodon</a>
      <a class="btn btn-ghost" href="https://wa.me/821052880006" target="_blank" rel="noopener noreferrer">WhatsApp</a>
      <a class="btn btn-ghost" href="mailto:ceodon@gmail.com">ceodon@gmail.com</a>
    </div>
    <p class="small" style="margin-top:.7rem">ERGSN CO., LTD. &middot; #503 Susong BD, 12-21 Seoae-ro 5-gil, Joong-gu, Seoul 04623, Republic of Korea</p>
  </div>`;
  $('content').innerHTML = html;

  /* Wire Accept Quotation button if present */
  const acceptBtn = document.getElementById('acceptQuoteBtn');
  if (acceptBtn) acceptBtn.addEventListener('click', () => acceptQuote(acceptBtn.dataset.quote));
  const rejectBtn = document.getElementById('rejectQuoteBtn');
  if (rejectBtn) rejectBtn.addEventListener('click', () => rejectQuote(rejectBtn.dataset.quote));
  /* Wire payment-proof upload */
  const ppBtn = document.getElementById('ppUploadBtn');
  if (ppBtn) ppBtn.addEventListener('click', () => uploadPaymentProof(tx.id));
}

async function rejectQuote(quotationId) {
  const reason = prompt('Reject quotation ' + quotationId + ' or request a revision. Tell us what to change (price, quantity, model, terms…):');
  if (reason === null) return;
  try {
    const r = await fetch(TD.API_URL + '/buyer/reject-quotation', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, quotation_id: quotationId, reason: (reason || '').trim() })
    });
    const j = await r.json();
    if (!r.ok || j.ok === false) throw new Error(j.error || 'HTTP ' + r.status);
    alert('✓ Sent. ERGSN will follow up with a revised quotation or contact you to discuss.');
  } catch (e) { alert('Reject failed: ' + e.message); }
}

async function uploadPaymentProof(txId) {
  const f = document.getElementById('ppFile').files[0];
  const msg = document.getElementById('ppMsg');
  if (!f) { msg.textContent = 'Pick a file first.'; return; }
  if (f.size > 12 * 1024 * 1024) { msg.textContent = 'File too large (max 12 MB).'; return; }
  msg.textContent = 'Uploading…';
  const fd = new FormData();
  fd.append('file', f);
  fd.append('transaction_id', txId);
  fd.append('kind', 'payment-proof');
  try {
    const r = await fetch(TD.API_URL + '/upload', {
      method: 'POST',
      headers: { 'X-Buyer-Token': token },
      body: fd
    });
    const j = await r.json();
    if (!r.ok || j.ok === false) throw new Error(j.error || 'HTTP ' + r.status);
    msg.textContent = '✓ Uploaded. ERGSN trade desk has been notified.';
    setTimeout(() => location.reload(), 1500);
  } catch (e) {
    msg.textContent = 'Upload failed: ' + e.message;
  }
}

async function acceptQuote(quotationId) {
  const sig = prompt('Type your full name to sign acceptance of quotation ' + quotationId + ':');
  if (!sig || !sig.trim()) return;
  try {
    const r = await fetch(TD.API_URL + '/buyer/accept-quotation', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, quotation_id: quotationId, buyer_signature: sig.trim() })
    });
    const j = await r.json();
    if (!r.ok || j.ok === false) throw new Error(j.error || 'HTTP ' + r.status);
    alert('✓ PO ' + j.id + ' created. ERGSN trade desk will follow up shortly.');
    location.reload();
  } catch (e) {
    alert('Accept failed: ' + e.message);
  }
}
</script>
<script defer src="scripts/header.js"></script>
</body>
</html>
